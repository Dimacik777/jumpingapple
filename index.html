<!DOCTYPE html>
<html lang="en">

<head>
    <title>🍏 APPLE | Jumping Apple</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/apple_smiling.png" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="🍏 APPLE | Jumping Apple" />
    <meta property="og:description" content="Watch the APPLE jump to the moon with live market cap tracking!" />
    <meta property="og:image" content="https://jumpingapple.live/apple_smiling.png" />
    <meta property="og:url" content="https://jumpingapple.live" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Balsamiq Sans"', 'cursive'],
                    },
                    colors: {
                        degen: {
                            pink: '#ff00ff',
                            cyan: '#00ffff',
                            yellow: '#ffff00',
                            green: '#00ff00',
                            dark: '#111111'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            color: white;
            user-select: none;
        }

        /* Twinkling stars animation */
        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        /* Cloud animation */
        @keyframes floatCloud {
            0% {
                transform: translateX(-150px);
            }

            100% {
                transform: translateX(120vw);
            }
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            animation: floatCloud infinite linear;
        }

        /* Warp stars */
        .star-warp {
            width: var(--warp-size) !important;
            height: 2px !important;
            transform: scaleX(20);
            background: white !important;
            box-shadow: 0 0 10px white, 0 0 20px cyan;
            transition: all 0.5s ease-in-out;
            animation: warpMove 0.5s infinite linear !important;
        }

        @keyframes warpMove {
            0% {
                transform: scaleX(1) translateX(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scaleX(40) translateX(2000px);
                opacity: 0;
            }
        }

        /* Nebula text */
        @keyframes swirl {
            0% {
                background-position: 0% 50%;
                border-color: rgba(255, 0, 255, 0.5);
            }

            50% {
                background-position: 100% 50%;
                border-color: rgba(0, 255, 255, 0.5);
            }

            100% {
                background-position: 0% 50%;
                border-color: rgba(255, 0, 255, 0.5);
            }
        }

        .liquid-glass-text {
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(200, 220, 255, 0.9) 25%, rgba(255, 255, 255, 1) 50%, rgba(220, 240, 255, 0.9) 75%, rgba(255, 255, 255, 1) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 40px rgba(200, 230, 255, 0.6));
            animation: flowGlass 5s linear infinite;
        }

        @keyframes flowGlass {
            to {
                background-position: 200% center;
            }
        }

        .golden-pulse {
            animation: pulseGold 2s infinite ease-in-out;
        }

        @keyframes pulseGold {

            0%,
            100% {
                text-shadow: 0 0 10px rgba(251, 191, 36, 0.6), 0 0 20px rgba(251, 191, 36, 0.4);
                transform: scale(1);
            }

            50% {
                text-shadow: 0 0 20px rgba(251, 191, 36, 1), 0 0 40px rgba(251, 191, 36, 0.8);
                transform: scale(1.02);
            }
        }

        .planet-texture-craters {
            background-image: radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.1) 10%, transparent 15%),
                radial-gradient(circle at 70% 60%, rgba(0, 0, 0, 0.2) 15%, transparent 20%),
                radial-gradient(circle at 20% 80%, rgba(0, 0, 0, 0.15) 8%, transparent 12%);
        }

        .planet-texture-clouds {
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.4) 10%, transparent 30%),
                radial-gradient(ellipse at 80% 60%, rgba(255, 255, 255, 0.3) 15%, transparent 40%),
                radial-gradient(ellipse at 20% 70%, rgba(255, 255, 255, 0.5) 8%, transparent 25%);
            animation: floatCloud 20s infinite linear;
        }

        .planet-texture-cracks {
            background-image:
                linear-gradient(45deg, transparent 40%, rgba(255, 255, 255, 0.8) 41%, transparent 42%),
                linear-gradient(-30deg, transparent 60%, rgba(255, 255, 255, 0.6) 61%, transparent 62%);
        }

        .planet-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg) rotateY(-15deg);
            width: 180%;
            height: 180%;
            border-radius: 50%;
            border: 20px solid rgba(200, 150, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .fade-overlay {
            position: absolute;
            inset: 0;
            background: black;
            pointer-events: none;
            z-index: 50;
        }

        .infinity-symbol {
            font-family: Arial, sans-serif;
            font-size: 400px;
            font-weight: 300;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // Expose Framer Motion from globals
        const { motion, useAnimation, useMotionValue, useTransform, AnimatePresence } = window.Motion;
        const { useState, useEffect, useRef } = React;

        // --- Configuration Constants ---
        const MAX_MCAP = 100000;
        const LEVELS = [
            { name: "Ground Zero", cap: 10000, theme: "grass" },
            { name: "Suburbia", cap: 30000, theme: "houses" },
            { name: "Big City", cap: 50000, theme: "skyscrapers" },
            { name: "Stratosphere", cap: 75000, theme: "clouds" },
            { name: "Deep Space", cap: 149999, theme: "space" },
            { name: "Planet Alpha", cap: 184999, theme: "space" },
            { name: "Planet Pump", cap: 219999, theme: "space" },
            { name: "Planet Power", cap: 259999, theme: "space" },
            { name: "Planet Legend", cap: 299999, theme: "space" },
            { name: "The Eternal", cap: Infinity, theme: "space" }
        ];

        const PLANETS = [
            { cap: 150000, max: 184999, name: 'Alpha', color: 'rgba(220, 38, 38, 0.7)', neon: '#dc2626', texture: 'planet-texture-craters', style: {} },
            { cap: 185000, max: 219999, name: 'Pump', color: 'rgba(16, 185, 129, 0.8)', neon: '#10b981', texture: 'planet-texture-clouds', style: {} },
            { cap: 220000, max: 259999, name: 'Power', color: 'rgba(126, 34, 206, 0.9)', neon: '#7e22ce', texture: '', hasRing: true, style: {} },
            { cap: 260000, max: 299999, name: 'Legend', color: 'rgba(56, 189, 248, 0.7)', neon: '#38bdf8', texture: 'planet-texture-cracks', style: { boxShadow: 'inset 0 0 50px rgba(255,255,255,0.8)' } },
            { cap: 300000, max: Infinity, name: 'Eternal', color: 'rgba(251, 191, 36, 1)', neon: '#fbbf24', texture: '', style: { boxShadow: '0 0 200px rgba(251,191,36,0.8), inset 0 0 100px white' } }
        ];
        // --- Helper Components ---

        // --- Level Background Components ---
        // Each background component renders the specific visuals for that level

        const GroundLevel = () => {
            const flowers = ['🌸', '🌺', '🌻', '🌼', '🌷'];
            return (
                <div className="absolute inset-0 bg-gradient-to-b from-cyan-300 to-green-500 flex flex-col justify-end overflow-hidden z-0">
                    {/* Background Hills */}
                    <div className="absolute bottom-16 left-[-10%] w-[60%] h-64 bg-green-400 rounded-[100%] shadow-[inset_0_20px_40px_rgba(0,0,0,0.1)]"></div>
                    <div className="absolute bottom-12 right-[-20%] w-[70%] h-72 bg-green-500 rounded-[100%] shadow-[inset_0_20px_40px_rgba(0,0,0,0.15)]"></div>

                    {/* Grass base */}
                    <div className="h-48 bg-green-500 w-full relative border-t-8 border-green-600 z-10 flex">
                        {/* Flowers */}
                        {[...Array(30)].map((_, i) => (
                            <div key={i} className="absolute text-5xl origin-bottom"
                                style={{
                                    left: `${Math.random() * 95}%`,
                                    bottom: `${10 + Math.random() * 60}%`,
                                    transform: `scale(${0.4 + Math.random() * 0.5})`
                                }}>
                                {flowers[i % flowers.length]}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HousesLevel = () => (
            <div className="absolute inset-0 bg-gradient-to-b from-blue-400 to-blue-300 flex flex-col justify-end overflow-hidden z-0">
                <div className="flex justify-around items-end w-full px-4 mb-32">
                    {[...Array(6)].map((_, i) => (
                        <div key={i} className="flex items-end gap-2">
                            {/* Stylized Tree */}
                            {i % 2 === 0 && (
                                <div className="flex flex-col items-center opacity-80 mb-[-10px]">
                                    <div className="w-10 h-10 bg-green-600 rounded-full mb-[-10px] z-10 shadow-[inset_-5px_-5px_10px_rgba(0,0,0,0.2)]"></div>
                                    <div className="w-3 h-10 bg-amber-800"></div>
                                </div>
                            )}

                            {/* House */}
                            <div className="flex flex-col items-center z-20">
                                {/* Roof */}
                                <div className="w-0 h-0 border-l-[40px] border-l-transparent border-r-[40px] border-r-transparent border-b-[40px] border-b-red-600 shadow-md"></div>
                                {/* House body */}
                                <div className="w-[60px] h-[60px] bg-yellow-100 flex justify-center pt-2 shadow-[inset_0_5px_10px_rgba(0,0,0,0.05)]">
                                    <div className="w-4 h-4 bg-blue-200 shadow-inner"></div>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const CityLevel = () => (
            <div className="absolute inset-0 bg-gradient-to-b from-indigo-900 via-purple-800 to-orange-500 flex flex-col justify-end overflow-hidden z-0">
                {/* Sunset Glow */}
                <div className="absolute bottom-0 w-full h-[50%] bg-gradient-to-t from-yellow-500/30 to-transparent mix-blend-overlay"></div>

                <div className="flex items-end w-full h-[60%] z-10">
                    {[...Array(10)].map((_, i) => {
                        const height = 40 + Math.random() * 50;
                        return (
                            <div key={i} className="flex-1 bg-slate-900 border-x border-slate-700 flex flex-wrap gap-1 p-2 content-start shadow-xl" style={{ height: `${height}%` }}>
                                {[...Array(Math.floor(height / 2))].map((_, j) => {
                                    const isLit = Math.random() > 0.6;
                                    const blinkRate = Math.random() * 5 + 3;
                                    return (
                                        <div key={j} className={`w-3 h-3 ${isLit ? 'bg-yellow-200 shadow-[0_0_15px_yellow] opacity-90' : 'bg-slate-800/80'} ${isLit && Math.random() > 0.8 ? 'animate-pulse' : ''}`} style={{ animationDuration: `${blinkRate}s` }}></div>
                                    )
                                })}
                            </div>
                        )
                    })}
                </div>
            </div>
        );

        const CloudsLevel = () => (
            <div className="absolute inset-0 bg-gradient-to-b from-cyan-400 to-blue-300 overflow-hidden z-0">
                {[...Array(10)].map((_, i) => (
                    <div
                        key={i}
                        className="cloud"
                        style={{
                            top: `${10 + Math.random() * 70}%`,
                            left: `-200px`, /* Start offscreen */
                            width: `${100 + Math.random() * 120}px`,
                            height: `${40 + Math.random() * 40}px`,
                            animationDuration: `${20 + Math.random() * 30}s`,
                            animationDelay: `-${Math.random() * 50}s` /* Negative delay pre-populates screen */
                        }}
                    >
                        <div className="absolute top-[-50%] left-[20%] w-[60%] h-[150%] bg-[rgba(255,255,255,0.8)] rounded-full"></div>
                    </div>
                ))}
            </div>
        );

        const SpaceLevel = ({ marketCap }) => {
            const [warpState, setWarpState] = useState('none');
            const prevCapRef = useRef(marketCap);

            useEffect(() => {
                const prev = prevCapRef.current;
                if (prev < 300000 && marketCap >= 300000) {
                    setWarpState('warping');
                    setTimeout(() => setWarpState('done'), 2000);
                } else if (marketCap < 300000) {
                    setWarpState('none');
                } else if (marketCap >= 300000 && warpState === 'none') {
                    setWarpState('done');
                }
                prevCapRef.current = marketCap;
            }, [marketCap]);

            const isWarping = warpState === 'warping';
            const isDone = warpState === 'done';
            const activePlanet = PLANETS.find(p => marketCap >= p.cap && marketCap <= p.max);

            // Parallax offset based on marketcap depth (max distance 300000 - 150000)
            const getParallaxOffset = () => {
                if (marketCap < 150000) return 0;
                const progress = (marketCap - 150000) / 150000;
                return progress * 200; // Move down 200px over the course of the planets
            };

            const bgClasses = isDone
                ? "absolute inset-0 bg-gradient-to-b from-black via-[#0a001a] to-black overflow-hidden z-0 transition-colors duration-[3000ms]"
                : "absolute inset-0 bg-gradient-to-b from-black via-purple-900 to-indigo-900 overflow-hidden z-0 transition-colors duration-[3000ms]";

            return (
                <motion.div
                    className={bgClasses}
                >
                    {/* Stars - Move faster than planets for parallax effect */}
                    <motion.div
                        animate={{ y: getParallaxOffset() * 1.5 }}
                        transition={{ duration: 1, ease: "easeOut" }}
                        className="absolute inset-0 z-0"
                    >
                        {[...Array(isDone ? 300 : isWarping ? 150 : 100)].map((_, i) => {
                            const size = Math.random() * 3 + 1;
                            const brightness = isDone ? Math.random() * 0.5 + 0.5 : 1;
                            return (
                                <div
                                    key={i}
                                    className={`star ${isWarping ? 'star-warp z-10' : ''}`}
                                    style={{
                                        width: `${size}px`,
                                        height: `${size}px`,
                                        top: `${Math.random() * 100}%`,
                                        left: `${Math.random() * 100}%`,
                                        animationDuration: isWarping ? `${0.2 + Math.random() * 0.3}s` : `${0.5 + Math.random() * 2}s`,
                                        animationDelay: `${Math.random() * -2}s`,
                                        '--warp-size': `${size * 60}px`,
                                        opacity: brightness
                                    }}
                                ></div>
                            )
                        })}
                    </motion.div>

                    {/* Moon - static to background */}
                    {!isWarping && !isDone && (
                        <motion.div
                            animate={{ y: getParallaxOffset() * 0.5 }}
                            transition={{ duration: 1, ease: "easeOut" }}
                            className="absolute top-[10%] right-[10%] w-32 h-32 bg-gray-200 rounded-full shadow-[0_0_40px_white] flex items-center justify-center transition-opacity duration-1000 z-0"
                        >
                            <div className="w-8 h-8 rounded-full bg-gray-300 absolute top-4 left-4 opacity-50"></div>
                            <div className="w-12 h-12 rounded-full bg-gray-300 absolute bottom-6 right-8 opacity-50"></div>
                        </motion.div>
                    )}

                    {/* Holographic Planets */}
                    <AnimatePresence>
                        {activePlanet && !isDone && (
                            <motion.div
                                key={activePlanet.name}
                                initial={{ opacity: 0, scale: 0.8 }}
                                animate={{ opacity: 1, scale: 1, y: getParallaxOffset() * 0.2 }} // Slower parallax for planets
                                exit={{ opacity: 0, scale: 1.2 }}
                                transition={{ duration: 1.5, ease: "easeOut" }}
                                className={`absolute top-[40%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full flex items-center justify-center pointer-events-none z-10 ${isWarping ? 'blur-xl opacity-0' : ''} ${activePlanet.texture}`}
                                style={{
                                    background: `radial-gradient(circle at 35% 35%, ${activePlanet.color}, transparent 80%)`,
                                    boxShadow: `0 0 120px ${activePlanet.color}, inset 0 0 60px ${activePlanet.neon}`,
                                    ...activePlanet.style
                                }}
                            >
                                {activePlanet.hasRing && (
                                    <div className="planet-ring"></div>
                                )}
                                <div className="absolute inset-0 flex items-center justify-center flex-col pointer-events-none z-20">
                                    <span className="text-white/80 text-3xl font-black tracking-widest uppercase drop-shadow-[0_0_15px_rgba(255,255,255,0.7)]">
                                        {activePlanet.name}
                                    </span>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Infinity Finale */}
                    <AnimatePresence>
                        {isDone && (
                            <motion.div
                                initial={{ opacity: 0, scale: 0.2 }}
                                animate={{ opacity: 1, scale: 1 }}
                                transition={{ duration: 4, ease: "easeOut" }} // Smooth fade in
                                className="absolute top-[40%] left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center z-20"
                            >
                                <div className="relative flex items-center justify-center">
                                    <h1 className="infinity-symbol liquid-glass-text m-0 p-0 text-[350px]">
                                        ∞
                                    </h1>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </motion.div>
            );
        };

        // --- Main Scene Component ---

        const TrackerScene = ({ marketCap }) => {
            // Calculate current level
            let levelIndex = 0;
            for (let i = 0; i < LEVELS.length; i++) {
                if (marketCap <= LEVELS[i].cap) {
                    levelIndex = i;
                    break;
                }
            }
            if (marketCap > LEVELS[LEVELS.length - 1].cap) levelIndex = LEVELS.length - 1;

            const currentLevel = LEVELS[levelIndex];

            // Calculate percentage of total progress for overall translation (capped at 1 to lock at Deep Space)
            const progress = Math.min(1, Math.max(0, (marketCap - 3500) / (MAX_MCAP - 3500)));

            // We want to smoothly move the camera up.
            // Since we stack the background panels from top (Space) to bottom (Ground),
            // we will translate the container.

            const panels = [
                <SpaceLevel key="space" marketCap={marketCap} />,
                <CloudsLevel key="clouds" />,
                <CityLevel key="city" />,
                <HousesLevel key="houses" />,
                <GroundLevel key="ground" />
            ];

            return (
                <div className="absolute inset-0 flex flex-col">
                    <motion.div
                        className="w-full h-[500vh] absolute bottom-0 flex flex-col z-0"
                        animate={{ y: `${progress * 80}%` }}
                        initial={{ y: "0%" }}
                        transition={{ type: "spring", stiffness: 50, damping: 20 }}
                    >
                        {panels.map((Panel, i) => (
                            <div key={i} className="w-full h-[100vh] relative">
                                {Panel}
                            </div>
                        ))}
                    </motion.div>
                </div>
            );
        };

        const AppleCharacter = ({ marketCap }) => {
            const [floatPhase, setFloatPhase] = useState('jumping');
            const floatRef = useRef(marketCap);

            useEffect(() => {
                const prev = floatRef.current;
                if (prev < 300000 && marketCap >= 300000) {
                    setFloatPhase('warping');
                    setTimeout(() => setFloatPhase('infinity'), 2000);
                } else if (marketCap < 300000) {
                    setFloatPhase('jumping');
                } else if (marketCap >= 300000 && floatPhase === 'jumping') {
                    setFloatPhase('infinity');
                }
                floatRef.current = marketCap;
            }, [marketCap, floatPhase]);

            let bounceHeight = -50; // Default gentle bounce
            let bounceDuration = 0.8;
            let showFire = false;
            let imageSize = "w-52 h-52";
            let glowStyle = "drop-shadow(0 0 20px rgba(0, 255, 0, 0.4))"; // Green glow

            if (marketCap > 10000 && marketCap <= 30000) {
                bounceHeight = -60;
                bounceDuration = 0.7;
                imageSize = "w-56 h-56";
                glowStyle = "drop-shadow(0 0 25px rgba(0, 255, 0, 0.5))";
            } else if (marketCap > 30000 && marketCap <= 50000) {
                bounceHeight = -80;
                bounceDuration = 0.6;
                imageSize = "w-60 h-60";
                glowStyle = "drop-shadow(0 0 35px rgba(255, 255, 0, 0.6))";
            } else if (marketCap > 50000 && marketCap <= 75000) {
                bounceHeight = -90;
                bounceDuration = 0.55;
                imageSize = "w-64 h-64";
                glowStyle = "drop-shadow(0 0 45px rgba(255, 165, 0, 0.7))";
            } else if (marketCap > 75000) {
                bounceHeight = -100;
                bounceDuration = 0.5;
                showFire = true;
                imageSize = "w-72 h-72";
                glowStyle = "drop-shadow(0 0 60px rgba(255, 0, 0, 0.8))";
            }

            // Figure 8 animation logic
            let animateProps = { y: [0, bounceHeight, 0], x: 0, rotate: 0, scaleY: [0.95, 1.05, 0.95], scaleX: [1.05, 0.95, 1.05] };
            let transitionProps = { repeat: Infinity, duration: bounceDuration, ease: "easeInOut" };

            if (floatPhase === 'infinity') {
                const W = 380;
                const baseY = -220; // Float around the center of the infinity symbol

                // Exact Lemniscate of Bernoulli path for Figure-8
                const steps = 100;
                const xArr = [];
                const yArr = [];
                const scale = 220; // Adjusted Size of the Infinity figure-8

                for (let i = 0; i <= steps; i++) {
                    // Offset phase so it starts from center and moves smoothly
                    const t = (i / steps) * Math.PI * 2;
                    const denom = Math.pow(Math.sin(t), 2) + 1;
                    xArr.push((scale * Math.SQRT2 * Math.cos(t)) / denom);
                    yArr.push(baseY + ((scale * Math.SQRT2 * Math.cos(t) * Math.sin(t)) / denom));
                }

                animateProps = {
                    x: xArr,
                    y: yArr,
                    rotate: 0,
                    scale: 0.9
                };
                transitionProps = { repeat: Infinity, duration: 8, ease: "linear" };
                showFire = false; // Turn off fire during infinity
                glowStyle = "drop-shadow(0 0 80px rgba(255, 255, 255, 1))"; // Pure star glow
            } else if (floatPhase === 'warping') {
                animateProps = {
                    y: bounceHeight,
                    x: [-15, 15, -15],
                    scale: [1, 1.1, 1.2],
                    rotate: [-5, 5, -5]
                };
                transitionProps = { repeat: Infinity, duration: 0.1, ease: "linear" };
            }

            return (
                <div className="absolute bottom-48 left-1/2 -translate-x-1/2 z-40 flex flex-col items-center justify-end pointer-events-none">
                    <motion.div
                        key={floatPhase}
                        animate={animateProps}
                        transition={transitionProps}
                        className="relative flex items-center justify-center"
                    >
                        {/* Character Images Crossfaded */}
                        <div className={`relative ${imageSize} transition-all duration-1000`} style={{ filter: glowStyle }}>
                            <img
                                src="apple_green.png"
                                alt="Apple Green"
                                className={`w-full h-full object-contain transition-opacity duration-700 ease-in-out ${marketCap <= 30000 ? 'opacity-100' : 'opacity-0'}`}
                            />
                            <img
                                src="apple_yellow.png"
                                alt="Apple Yellow"
                                className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-700 ease-in-out ${marketCap > 30000 && marketCap <= 75000 ? 'opacity-100' : 'opacity-0'}`}
                            />
                            <img
                                src="apple_smiling.png"
                                alt="Apple Red"
                                className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-700 ease-in-out ${marketCap > 75000 ? 'opacity-100' : 'opacity-0'}`}
                            />
                        </div>

                        {/* Fire Trail (Space Level) */}
                        <AnimatePresence>
                            {showFire && (
                                <motion.div
                                    initial={{ opacity: 0, scale: 0 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0, transition: { duration: 0.2 } }}
                                    className="absolute -bottom-10 w-24 h-28 flex justify-center z-[-1]"
                                >
                                    <motion.div
                                        animate={{ height: ['100%', '60%', '110%'], opacity: [0.3, 1, 0.3] }}
                                        transition={{ repeat: Infinity, duration: 0.05 }}
                                        className="w-full h-full bg-gradient-to-t from-transparent via-orange-500 to-yellow-300 rounded-b-full filter blur-md"
                                    ></motion.div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </motion.div>
                </div>
            );
        };

        // --- Main App Component ---

        const App = () => {
            const TARGET_CA = "2zvJ4YCq4QzPUY5Vq24CKJGWNhSrFiGTUxoukvCtpump"; // Replace this on real launch

            const [marketCap, setMarketCap] = useState(3500);
            const [isLive, setIsLive] = useState(false);
            const isManual = useRef(false);

            useEffect(() => {
                const fetchMarketCap = async () => {
                    if (isManual.current || !TARGET_CA) return;
                    try {
                        const response = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${TARGET_CA}`);
                        if (!response.ok) throw new Error('Network response was not ok');
                        const data = await response.json();

                        // Parse FDV from Dexscreener response
                        if (data && data.pairs && data.pairs.length > 0 && data.pairs[0].fdv) {
                            setMarketCap(Number(data.pairs[0].fdv));
                            setIsLive(true);
                        } else {
                            setIsLive(false);
                        }
                    } catch (error) {
                        console.error("Error fetching live market cap:", error);
                        setIsLive(false);
                    }
                };

                // Fetch immediately, then set interval
                fetchMarketCap();
                const intervalId = setInterval(fetchMarketCap, 2000); // 2s polling per user request

                return () => clearInterval(intervalId);
            }, []);

            // Format monetary value
            const formatMoney = (val) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    maximumFractionDigits: 0
                }).format(val);
            };

            return (
                <div className="relative w-full h-screen font-sans selection:bg-degen-pink selection:text-white bg-black">
                    {/* Scene Background */}
                    <TrackerScene marketCap={marketCap} />

                    {/* Character */}
                    <AppleCharacter marketCap={marketCap} />

                    {/* UI Layer */}
                    <div className="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 z-20">
                        {/* Header */}
                        <div className="flex justify-between items-start pointer-events-auto w-full">
                            <motion.div
                                initial={{ y: -50, opacity: 0 }}
                                animate={{ y: 0, opacity: 1 }}
                                className="bg-black/60 backdrop-blur-md border-2 border-degen-yellow p-3 md:p-4 rounded-2xl shadow-[0_0_20px_rgba(255,255,0,0.3)] w-[50%] md:w-auto overflow-hidden max-w-[280px]"
                            >
                                <h1 className="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-degen-yellow to-degen-pink">
                                    APPLE
                                </h1>
                                <div
                                    className="mt-2 mb-2 flex items-center gap-2 bg-black/40 rounded-lg px-2 md:px-3 py-1.5 cursor-pointer border border-white/20 hover:border-white/50 transition-colors group w-full md:w-[240px] justify-between"
                                    onClick={(e) => {
                                        if (!TARGET_CA) return;
                                        navigator.clipboard.writeText(TARGET_CA);
                                        const t = e.currentTarget.querySelector('.ca-text');
                                        const orig = t.innerText;
                                        t.innerText = 'Copied!';
                                        setTimeout(() => t.innerText = orig, 2000);
                                    }}
                                >
                                    <span className="text-[10px] md:text-xs text-gray-300 font-mono tracking-wider">CA:</span>
                                    <span className="text-[10px] md:text-xs text-degen-cyan font-mono ca-text group-hover:text-white transition-colors">
                                        {TARGET_CA ? TARGET_CA.slice(0, 8) + '...pump' : 'LAUNCHING SOON'}
                                    </span>
                                    <svg viewBox="0 0 24 24" className="w-4 h-4 text-gray-400 group-hover:text-white transition-colors ml-1" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                </div>
                                <div className="flex items-center gap-2 mt-1">
                                    <div className="text-[10px] md:text-sm text-gray-300 uppercase tracking-widest">
                                        Live Market Cap
                                        {!isLive && TARGET_CA && <span className="ml-2 text-yellow-400 animate-pulse text-[10px]">Syncing...</span>}
                                        {!TARGET_CA && <span className="ml-2 text-gray-400 text-[10px]">(Awaiting Launch)</span>}
                                    </div>
                                </div>
                                <motion.div
                                    key={marketCap}
                                    initial={{ scale: 1.2, color: '#ff00ff' }}
                                    animate={{ scale: 1, color: '#ffffff' }}
                                    className={`text-2xl md:text-4xl font-bold mt-2 truncate w-full ${marketCap >= 300000 ? 'text-amber-300 golden-pulse' : 'text-white'}`}
                                >
                                    {formatMoney(marketCap)}
                                </motion.div>
                            </motion.div>
                        </div>

                        {/* Right Sidebar UI */}
                        <div className="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 flex flex-col gap-4 md:gap-6 z-50 pointer-events-auto items-center">
                            {/* BUY Button */}
                            <a href={TARGET_CA ? `https://pump.fun/coin/${TARGET_CA}` : '#'} target={TARGET_CA ? "_blank" : "_self"} rel="noopener noreferrer" className="relative flex items-center justify-center w-16 h-16 md:w-24 md:h-24 rounded-full bg-gradient-to-tr from-pink-600 to-pink-400 text-white font-black text-xl md:text-2xl border-2 md:border-4 border-white shadow-[0_0_20px_rgba(255,20,147,0.8)] hover:shadow-[0_0_40px_rgba(255,20,147,1)] active:scale-95 animate-pulse hover:scale-110 transition-all text-center leading-tight overflow-hidden group">
                                <span className="relative z-10 drop-shadow-lg">BUY</span>
                                <div className="absolute inset-0 bg-white/20 blur-md rounded-full scale-0 group-hover:scale-150 transition-all duration-500"></div>
                            </a>
                            {/* Twitter Button */}
                            <a href="https://x.com/i/communities/2030146713147830397/" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center w-16 h-16 md:w-24 md:h-24 rounded-full bg-[#1DA1F2] text-white border-2 md:border-4 border-white shadow-[0_0_20px_rgba(29,161,242,0.8)] hover:bg-[#1a91da] hover:shadow-[0_0_40px_rgba(29,161,242,1)] active:scale-95 hover:scale-110 transition-all group">
                                <svg viewBox="0 0 24 24" className="w-6 h-6 md:w-10 md:h-10 fill-current group-hover:scale-110 transition-transform" aria-hidden="true">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 5.964H5.078z"></path>
                                </svg>
                            </a>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
